name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows (win-x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui --ignore-failed-sources

      - name: Publish Windows
        run: dotnet publish src/MyNetworkTime.App/MyNetworkTime.App.csproj -c Release -f net10.0-windows10.0.19041.0 -r win-x64

      - name: Package Windows publish output
        shell: pwsh
        run: |
          $publishDir = "src/MyNetworkTime.App/bin/Release/net10.0-windows10.0.19041.0/win-x64/publish"
          $zipPath = "artifacts/MyNetworkTime-windows-win-x64-${{ github.ref_name }}.zip"
          New-Item -ItemType Directory -Force -Path "artifacts" | Out-Null
          Compress-Archive -Path "$publishDir/*" -DestinationPath $zipPath -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: artifacts/*.zip

  build-android:
    name: Build Android (apk+aab)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android --ignore-failed-sources

      - name: Publish Android
        run: dotnet publish src/MyNetworkTime.App/MyNetworkTime.App.csproj -c Release -f net10.0-android

      - name: Collect Android artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "artifacts" | Out-Null
          Copy-Item "src/MyNetworkTime.App/bin/Release/net10.0-android/publish/*.apk" "artifacts/" -Force
          Copy-Item "src/MyNetworkTime.App/bin/Release/net10.0-android/publish/*.aab" "artifacts/" -Force

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: artifacts/*

  create-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-windows
      - build-android
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-assets

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
